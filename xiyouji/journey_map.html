        }

            fill: #f5f0e3;
            stroke: #c19a6b;
            stroke-width: 1;

        // 绘制路线图
        const svg = document.getElementById('routeSvg');
        
        function drawRoute() {
            // 清空SVG内容
            svg.innerHTML = '';
            
            // 添加背景
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', '0');
            rect.setAttribute('y', '0');
            rect.setAttribute('width', '2000');
            rect.setAttribute('height', '1500');
            rect.setAttribute('class', 'svg-background');
            svg.appendChild(rect);
            
            // 添加标题
            const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            title.setAttribute('x', '1000');
            title.setAttribute('y', '80');
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('font-family', 'Microsoft YaHei, SimSun');
            title.setAttribute('font-size', '40');
            title.setAttribute('font-weight', 'bold');
            title.setAttribute('fill', '#8B4513');
            title.setAttribute('text-shadow', '2px 2px 4px rgba(0,0,0,0.2)');
            title.textContent = '西游记取经路线图';
            svg.appendChild(title);
            
            // 定义主要地点（重新设计布局，使其更加美观）
            const locations = [
                { name: '长安', x: 200, y: 200, desc: '东土大唐起点' },
                { name: '两界山', x: 400, y: 200, desc: '收孙悟空' },
                { name: '高老庄', x: 600, y: 200, desc: '收猪八戒' },
                { name: '流沙河', x: 800, y: 200, desc: '收沙僧' },
                { name: '万寿山', x: 1000, y: 200, desc: '五庄观' },
                { name: '白虎岭', x: 1200, y: 150, desc: '三打白骨精' },
                { name: '平顶山', x: 1400, y: 150, desc: '金角银角' },
                { name: '乌鸡国', x: 1600, y: 150, desc: '狮精作乱' },
                { name: '号山', x: 1800, y: 100, desc: '红孩儿' },
                { name: '黑水河', x: 1800, y: 250, desc: '鼍龙' },
                { name: '车迟国', x: 1600, y: 300, desc: '斗法三仙' },
                { name: '通天河', x: 1400, y: 350, desc: '灵感大王' },
                { name: '女儿国', x: 1200, y: 400, desc: '女儿国国王' },
                { name: '火焰山', x: 1000, y: 450, desc: '芭蕉扇' },
                { name: '祭赛国', x: 800, y: 450, desc: '九头虫' },
                { name: '小雷音寺', x: 600, y: 450, desc: '黄眉大王' },
                { name: '朱紫国', x: 400, y: 450, desc: '赛太岁' },
                { name: '盘丝洞', x: 200, y: 450, desc: '蜘蛛精' },
                { name: '狮驼岭', x: 200, y: 600, desc: '三妖' },
                { name: '比丘国', x: 400, y: 650, desc: '白鹿精' },
                { name: '无底洞', x: 600, y: 700, desc: '老鼠精' },
                { name: '灭法国', x: 800, y: 750, desc: '灭法国' },
                { name: '凤仙郡', x: 1000, y: 800, desc: '求雨' },
                { name: '玉华州', x: 1200, y: 850, desc: '收徒' },
                { name: '金平府', x: 1400, y: 900, desc: '三犀牛' },
                { name: '天竺国', x: 1600, y: 950, desc: '玉兔精' },
                { name: '灵山', x: 1800, y: 1000, desc: '取得真经' }
            ];
            
            // 生成路线路径（使用平滑曲线）
            let pathData = `M ${locations[0].x} ${locations[0].y}`;
            for (let i = 1; i < locations.length; i++) {
                const prevLoc = locations[i-1];
                const currLoc = locations[i];
                // 使用贝塞尔曲线使路线更加平滑
                const controlX = (prevLoc.x + currLoc.x) / 2;
                const controlY = (prevLoc.y + currLoc.y) / 2;
                pathData += ` Q ${controlX} ${controlY}, ${currLoc.x} ${currLoc.y}`;
            }
            
            // 添加路线
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', pathData);
            path.setAttribute('class', 'route-path');
            svg.appendChild(path);
            
            // 添加地点节点
            locations.forEach((loc, index) => {
                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                group.setAttribute('class', 'location-node');
                
                // 添加节点圆
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', loc.x);
                circle.setAttribute('cy', loc.y);
                circle.setAttribute('r', '12');
                circle.setAttribute('class', `node-circle ${index === 0 ? 'start' : index === locations.length - 1 ? 'end' : 'middle'}`);
                group.appendChild(circle);
                
                // 添加地点名称（根据位置调整文字位置，避免重叠）
                const name = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                name.setAttribute('x', loc.x);
                name.setAttribute('y', loc.y - 25);
                name.setAttribute('class', 'location-name');
                name.textContent = loc.name;
                group.appendChild(name);
                
                // 添加地点描述
                const desc = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                desc.setAttribute('x', loc.x);
                desc.setAttribute('y', loc.y + 35);
                desc.setAttribute('class', 'location-desc');
                desc.textContent = loc.desc;
                group.appendChild(desc);
                
                svg.appendChild(group);
            });
            
            // 添加起点标注
            const startMarker = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            startMarker.setAttribute('x', locations[0].x);
            startMarker.setAttribute('y', locations[0].y + 70);
            startMarker.setAttribute('class', 'start-end-marker');
            startMarker.textContent = '起点';
            svg.appendChild(startMarker);
            
            // 添加终点标注
            const endMarker = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            endMarker.setAttribute('x', locations[locations.length - 1].x);
            endMarker.setAttribute('y', locations[locations.length - 1].y + 70);
            endMarker.setAttribute('class', 'start-end-marker');
            endMarker.textContent = '终点';
            svg.appendChild(endMarker);
            
            // 添加装饰元素
            const sun = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            sun.setAttribute('cx', '1900');
            sun.setAttribute('cy', '100');
            sun.setAttribute('r', '50');
            sun.setAttribute('fill', '#f39c12');
            svg.appendChild(sun);
            
            const cloud = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            cloud.setAttribute('d', 'M 150 80 Q 130 60, 110 80 Q 90 60, 70 80 Q 50 60, 30 80 Q 40 100, 30 120 Q 40 140, 70 140 Q 90 140, 110 140 Q 130 140, 150 120 Q 160 140, 190 140 Q 210 140, 230 120 Q 240 100, 230 80 Q 210 60, 190 80 Q 170 60, 150 80');
            cloud.setAttribute('fill', 'white');
            cloud.setAttribute('stroke', '#ddd');
            cloud.setAttribute('stroke-width', '2');
            cloud.setAttribute('transform', 'translate(1700, 50)');
            svg.appendChild(cloud);
        }
        
        // 渲染事件列表
        function renderEventList(filter = 'all', locationFilter = 'all') {
            const eventGrid = document.getElementById('eventGrid');
            eventGrid.innerHTML = '';
            
            let filteredDiffs = difficulties;
            
            if (locationFilter !== 'all') {
                filteredDiffs = filteredDiffs.filter(d => d.location.includes(locationFilter));
            }
            
            if (filter !== 'all') {
                if (filter === '前17难') {
                    filteredDiffs = filteredDiffs.filter(d => d.num <= 17);
                } else if (filter === '中44难') {
                    filteredDiffs = filteredDiffs.filter(d => d.num > 17 && d.num <= 61);
                } else if (filter === '后20难') {
                    filteredDiffs = filteredDiffs.filter(d => d.num > 61);
                }
            }
            
            filteredDiffs.forEach(diff => {
                const card = document.createElement('div');
                card.className = 'event-card';
                card.innerHTML = `
                    <h4>第${diff.num}难：${diff.name}</h4>
                    <p><span class="label">地点：</span>${diff.location}</p>
                    <p><span class="label">人物：</span>${diff.characters.join('、')}</p>
                    <p><span class="label">描述：</span>${diff.description}</p>
                `;
                eventGrid.appendChild(card);
            });
        }
        
        // 初始化
        drawRoute();
        renderEventList();
        
        // 筛选事件
        document.getElementById('difficultyFilter').addEventListener('change', function() {
            const locationFilter = document.getElementById('locationFilter').value;
            renderEventList(this.value, locationFilter);
        });
        
        document.getElementById('locationFilter').addEventListener('change', function() {
            const difficultyFilter = document.getElementById('difficultyFilter').value;
            renderEventList(difficultyFilter, this.value);
        });
    </script>
